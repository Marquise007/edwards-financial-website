# Keeps the free-tier Supabase project awake by querying the database daily.
# Full contents of:  .github/workflows/supabase-keepalive.yml  (commit to main)

name: Supabase Keepalive

on:
  workflow_dispatch:        # manual "Run workflow" button
  schedule:
    - cron: "37 8 * * *"    # daily at 08:37 UTC

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Query Supabase to reset the inactivity timer
        env:
          SUPABASE_URL: https://rybnzvlogmbjlgdziswj.supabase.co
          ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5Ym56dmxvZ21iamxnZHppc3dqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0NjE3MjgsImV4cCI6MjA5NjAzNzcyOH0.m7oH-z4yI1AbchocncJU2TB7SawyijiXsTbcz3slwn0
        run: |
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/" \
            -H "apikey: $ANON_KEY" \
            -H "Authorization: Bearer $ANON_KEY")
          echo "Supabase responded: HTTP $HTTP"
          [ "$HTTP" -ge 200 ] && [ "$HTTP" -lt 500 ] || { echo "::error::Keepalive failed (HTTP $HTTP)"; exit 1; }
          echo "Keepalive OK — database queried, timer reset."
