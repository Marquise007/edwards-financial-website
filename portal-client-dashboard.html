<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>My Financial Dashboard — Edwards Financial & Associates</title>
<!-- Favicons -->
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<!-- Open Graph -->
<meta property="og:title" content="My Financial Dashboard | Edwards Financial & Associates">
<meta property="og:description" content="Your plan, documents, and progress at a glance with Edwards Financial & Associates.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://edwardsfinancialassociates.com/portal-client-dashboard">
<meta property="og:site_name" content="Edwards Financial & Associates">
<meta property="og:image" content="https://edwardsfinancialassociates.com/edwards-og-image.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --ink: #0d1e3a;
    --parchment: #f7f4ef;
    --gold: #b8972e;
    --gold-light: #d4af5a;
    --gold-muted: #8a6e22;
    --warm-gray: #6b6560;
    --rule: #d6cfc4;
    --white: #ffffff;
    --card-bg: #ffffff;
    --border: #e8e3dc;
  }
  html, body { height: 100%; }
  body {
    font-family: 'Montserrat', sans-serif;
    background: var(--parchment);
    color: var(--ink);
    min-height: 100vh;
  }

  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 40px;
    border-bottom: 1px solid var(--rule);
    background: rgba(247,244,239,0.95);
    backdrop-filter: blur(8px);
    position: sticky; top: 0; z-index: 50;
  }
  .nav-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px; font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--ink); text-decoration: none;
  }
  .nav-logo span { color: var(--gold); }
  .nav-right { display: flex; align-items: center; gap: 20px; }
  .nav-client-name {
    font-size: 11px; font-weight: 500;
    color: var(--warm-gray);
  }
  .btn-signout {
    font-size: 9px; font-weight: 600;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--warm-gray);
    background: none; border: 1px solid var(--rule);
    padding: 8px 16px; cursor: pointer;
    transition: all 0.2s;
  }
  .btn-signout:hover { border-color: var(--gold); color: var(--gold); }

  .page-header {
    padding: 48px 40px 32px;
    border-bottom: 1px solid var(--rule);
    background: var(--white);
  }
  .greeting {
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
  }
  .page-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px; font-weight: 300;
    color: var(--ink);
  }
  .page-title em { font-style: italic; color: var(--gold-muted); }
  .page-sub {
    font-size: 11px;
    color: var(--warm-gray);
    margin-top: 8px;
  }

  .dashboard {
    padding: 32px 40px;
    max-width: 1200px;
  }

  /* STATUS BANNER */
  .status-banner {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 24px;
    margin-bottom: 28px;
    border: 1px solid;
  }
  .status-banner.on-track { background: rgba(39,174,96,0.06); border-color: rgba(39,174,96,0.25); }
  .status-banner.needs-review { background: rgba(230,126,34,0.06); border-color: rgba(230,126,34,0.25); }
  .status-banner.at-risk { background: rgba(192,57,43,0.06); border-color: rgba(192,57,43,0.25); }
  .status-banner.new { background: rgba(184,151,46,0.06); border-color: rgba(184,151,46,0.25); }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .on-track .status-dot { background: #27ae60; }
  .needs-review .status-dot { background: #e67e22; }
  .at-risk .status-dot { background: #c0392b; }
  .new .status-dot { background: var(--gold); }
  .status-text { font-size: 11px; color: var(--ink); line-height: 1.5; }
  .status-text strong { font-weight: 600; }

  /* GRID */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .grid-1 { margin-bottom: 20px; }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    padding: 28px;
  }
  .card-label {
    font-size: 9px; font-weight: 600;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--warm-gray);
    margin-bottom: 6px;
  }
  .card-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 38px; font-weight: 300;
    color: var(--ink);
    line-height: 1;
    margin-bottom: 4px;
  }
  .card-value.gold { color: var(--gold-muted); }
  .card-value.green { color: #27ae60; }
  .card-value.red { color: #c0392b; }
  .card-sub {
    font-size: 10px;
    color: var(--warm-gray);
  }
  .card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px; font-weight: 400;
    color: var(--ink);
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }

  /* RETIREMENT PROGRESS */
  .retirement-progress {
    margin: 20px 0;
  }
  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }
  .progress-label { font-size: 10px; color: var(--warm-gray); }
  .progress-pct {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; color: var(--ink);
  }
  .progress-track {
    height: 8px;
    background: var(--parchment);
    border: 1px solid var(--rule);
    border-radius: 0;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-muted), var(--gold));
    transition: width 1s ease;
  }
  .income-breakdown { display: flex; flex-direction: column; gap: 10px; }
  .income-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
  }
  .income-source { color: var(--warm-gray); }
  .income-amount { font-weight: 500; color: var(--ink); }
  .income-gap { color: #c0392b; font-weight: 600; }
  .income-covered { color: #27ae60; font-weight: 600; }
  .income-divider { height: 1px; background: var(--rule); margin: 4px 0; }

  /* TAX BREAKDOWN */
  .tax-bars { display: flex; flex-direction: column; gap: 14px; margin-top: 4px; }
  .tax-row { display: flex; flex-direction: column; gap: 6px; }
  .tax-row-header { display: flex; justify-content: space-between; font-size: 10px; }
  .tax-row-label { color: var(--warm-gray); }
  .tax-row-val { font-weight: 500; color: var(--ink); }
  .tax-track {
    height: 6px;
    background: var(--parchment);
    border: 1px solid var(--rule);
  }
  .tax-fill-deferred { background: var(--ink); }
  .tax-fill-free { background: #27ae60; }
  .tax-fill-taxable { background: #e67e22; }

  /* ESTATE */
  .estate-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
  }
  .estate-row:last-child { border-bottom: none; }
  .estate-label { color: var(--warm-gray); }
  .estate-value { font-weight: 500; color: var(--ink); }
  .estate-gap-value { color: #e67e22; }
  .estate-ok-value { color: #27ae60; }

  /* ACTION ITEMS */
  .action-list { display: flex; flex-direction: column; gap: 12px; }
  .action-item {
    display: flex;
    gap: 14px;
    padding: 16px;
    background: var(--parchment);
    border: 1px solid var(--rule);
  }
  .action-num {
    width: 24px; height: 24px;
    background: var(--ink);
    color: var(--white);
    font-size: 10px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-family: 'Cormorant Garamond', serif;
  }
  .action-text { font-size: 11px; color: var(--ink); line-height: 1.6; }

  /* LOADING */
  .loading { text-align: center; padding: 60px; color: var(--warm-gray); font-size: 11px; }

  /* ADVISOR CARD */
  .advisor-card {
    background: var(--ink);
    border: 1px solid rgba(184,151,46,0.2);
    padding: 28px;
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .advisor-initial {
    width: 52px; height: 52px;
    background: var(--gold);
    color: var(--ink);
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px; font-weight: 500;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .advisor-info { flex: 1; }
  .advisor-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px; color: var(--white);
    margin-bottom: 4px;
  }
  .advisor-title { font-size: 10px; color: rgba(255,255,255,0.45); letter-spacing: 0.05em; }
  .advisor-contact { font-size: 10px; color: var(--gold-light); margin-top: 6px; }
  .btn-contact {
    font-size: 9px; font-weight: 600;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--ink); background: var(--gold);
    border: none; padding: 11px 22px; cursor: pointer;
    text-decoration: none; white-space: nowrap;
    transition: background 0.2s;
  }
  .btn-contact:hover { background: var(--gold-light); }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Edwards <span>&</span> Associates</a>
  <div class="nav-right">
    <span class="nav-client-name" id="client-greeting">Loading...</span>
    <button class="btn-signout" onclick="signOut()">Sign Out</button>
  </div>
</nav>

<div id="dashboard-content">
  <div class="loading">Loading your financial dashboard...</div>
</div>

<script>
  const SUPABASE_URL = 'https://rybnzvlogmbjlgdziswj.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5Ym56dmxvZ21iamxnZHppc3dqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0NjE3MjgsImV4cCI6MjA5NjAzNzcyOH0.m7oH-z4yI1AbchocncJU2TB7SawyijiXsTbcz3slwn0';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = 'portal-client-login.html'; return; }

    const email = session.user.email;
    const { data: client, error } = await sb.from('client_profiles').select('*').eq('email', email).single();

    if (!client || error) {
      document.getElementById('dashboard-content').innerHTML = '<div class="loading">Your profile is being set up by your advisor. Please check back soon.</div>';
      return;
    }

    document.getElementById('client-greeting').textContent = client.first_name + ' ' + client.last_name;
    renderDashboard(client);
  }

  function renderDashboard(c) {
    const goal = Number(c.monthly_income_goal) || 0;
    const pension = Number(c.pension_income) || 0;
    const ss = Number(c.ss_income) || 0;
    const covered = pension + ss;
    const gap = goal - covered;
    const pct = goal ? Math.min(100, Math.round((covered / goal) * 100)) : 0;

    const totalPort = Number(c.total_portfolio) || 0;
    const taxDeferred = Number(c.tax_deferred) || 0;
    const taxFree = Number(c.tax_free) || 0;
    const taxable = Number(c.taxable_assets) || 0;

    const deathBenefit = Number(c.death_benefit) || 0;
    const legacyGoal = Number(c.legacy_goal) || 0;
    const legacyGap = legacyGoal - deathBenefit;

    const statusMap = {
      'on-track': { label: 'On Track', desc: 'Your retirement plan is progressing well. Keep up the great work.' },
      'needs-review': { label: 'Needs Attention', desc: 'Your advisor has identified areas that need attention. See your action items below.' },
      'at-risk': { label: 'Action Required', desc: 'Important items require your attention. Please review your action items and contact your advisor.' },
      'new': { label: 'Getting Started', desc: 'Your profile is being built. Your advisor will update your plan shortly.' }
    };
    const status = statusMap[c.status] || statusMap['new'];

    const actionItems = c.action_items ? c.action_items.split('\n').filter(a => a.trim()) : [];

    document.getElementById('dashboard-content').innerHTML = `
    <div class="page-header">
      <div class="greeting">Your Financial Dashboard</div>
      <h1 class="page-title">Welcome, <em>${c.first_name}</em></h1>
      <p class="page-sub">Last updated by your advisor · Edwards Financial & Associates</p>
    </div>

    <div class="dashboard">

      <div class="status-banner ${c.status || 'new'}">
        <div class="status-dot"></div>
        <div class="status-text"><strong>Plan Status: ${status.label}</strong> — ${status.desc}</div>
      </div>

      <!-- ROW 1: Key Numbers -->
      <div class="grid-3">
        <div class="card">
          <div class="card-label">Total Portfolio Value</div>
          <div class="card-value gold">${totalPort ? '$' + totalPort.toLocaleString() : '—'}</div>
          <div class="card-sub">Across all accounts</div>
        </div>
        <div class="card">
          <div class="card-label">Monthly Income Goal</div>
          <div class="card-value">${goal ? '$' + goal.toLocaleString() : '—'}</div>
          <div class="card-sub">At retirement</div>
        </div>
        <div class="card">
          <div class="card-label">Monthly Income Gap</div>
          <div class="card-value ${gap > 0 ? 'red' : 'green'}">${goal ? (gap > 0 ? '-$' + gap.toLocaleString() : 'Covered') : '—'}</div>
          <div class="card-sub">${gap > 0 ? 'Additional income needed' : 'Income sources cover goal'}</div>
        </div>
      </div>

      <!-- ROW 2: Retirement Progress + Tax Breakdown -->
      <div class="grid-2">
        <div class="card">
          <div class="card-title">Retirement Income Progress</div>
          <div class="retirement-progress">
            <div class="progress-header">
              <span class="progress-label">Income Covered</span>
              <span class="progress-pct">${pct}%</span>
            </div>
            <div class="progress-track">
              <div class="progress-fill" style="width:${pct}%"></div>
            </div>
            <div class="income-breakdown">
              ${c.pension_system ? `<div class="income-row"><span class="income-source">${c.pension_system} Pension</span><span class="income-amount">${pension ? '$' + pension.toLocaleString() + '/mo' : 'Pending'}</span></div>` : ''}
              <div class="income-row"><span class="income-source">Social Security (Est.)</span><span class="income-amount">${ss ? '$' + ss.toLocaleString() + '/mo' : 'Pending'}</span></div>
              <div class="income-divider"></div>
              <div class="income-row"><span class="income-source">Total Covered Income</span><span class="income-amount">$${covered.toLocaleString()}/mo</span></div>
              <div class="income-row"><span class="income-source">Monthly Goal</span><span class="income-amount">$${goal.toLocaleString()}/mo</span></div>
              <div class="income-divider"></div>
              <div class="income-row"><span class="income-source"><strong>Gap to Fill</strong></span><span class="${gap > 0 ? 'income-gap' : 'income-covered'}">${gap > 0 ? '-$' + gap.toLocaleString() + '/mo' : 'Goal Met ✓'}</span></div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">Portfolio Tax Breakdown</div>
          <div class="tax-bars">
            <div class="tax-row">
              <div class="tax-row-header">
                <span class="tax-row-label">Tax-Deferred (Traditional IRA/401k)</span>
                <span class="tax-row-val">${taxDeferred ? '$' + taxDeferred.toLocaleString() : '—'}</span>
              </div>
              <div class="tax-track"><div class="progress-fill tax-fill-deferred" style="width:${totalPort ? Math.round((taxDeferred/totalPort)*100) : 0}%"></div></div>
            </div>
            <div class="tax-row">
              <div class="tax-row-header">
                <span class="tax-row-label">Tax-Free (Roth / IUL)</span>
                <span class="tax-row-val">${taxFree ? '$' + taxFree.toLocaleString() : '—'}</span>
              </div>
              <div class="tax-track"><div class="progress-fill tax-fill-free" style="width:${totalPort ? Math.round((taxFree/totalPort)*100) : 0}%"></div></div>
            </div>
            <div class="tax-row">
              <div class="tax-row-header">
                <span class="tax-row-label">Taxable (Brokerage / Savings)</span>
                <span class="tax-row-val">${taxable ? '$' + taxable.toLocaleString() : '—'}</span>
              </div>
              <div class="tax-track"><div class="progress-fill tax-fill-taxable" style="width:${totalPort ? Math.round((taxable/totalPort)*100) : 0}%"></div></div>
            </div>
          </div>
          <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border);font-size:10px;color:var(--warm-gray);line-height:1.7;">
            A tax-diversified portfolio gives you flexibility to minimize taxes in retirement. Your advisor can help optimize your tax-free bucket.
          </div>
        </div>
      </div>

      <!-- ROW 3: Estate + Actions -->
      <div class="grid-2">
        <div class="card">
          <div class="card-title">Estate & Legacy Planning</div>
          <div class="estate-row">
            <span class="estate-label">Legacy Goal</span>
            <span class="estate-value">${legacyGoal ? '$' + legacyGoal.toLocaleString() : '—'}</span>
          </div>
          <div class="estate-row">
            <span class="estate-label">Current Death Benefit</span>
            <span class="estate-value">${deathBenefit ? '$' + deathBenefit.toLocaleString() : '—'}</span>
          </div>
          <div class="estate-row">
            <span class="estate-label">Legacy Gap</span>
            <span class="${legacyGap > 0 ? 'estate-gap-value' : 'estate-ok-value'} estate-value">${legacyGoal ? (legacyGap > 0 ? '-$' + legacyGap.toLocaleString() : 'Goal Met ✓') : '—'}</span>
          </div>
          <div class="estate-row">
            <span class="estate-label">Pension System</span>
            <span class="estate-value">${c.pension_system || '—'}</span>
          </div>
          <div class="estate-row">
            <span class="estate-label">Target Retirement Age</span>
            <span class="estate-value">${c.retirement_age || '—'}</span>
          </div>
        </div>

        <div class="card">
          <div class="card-title">Your Action Items</div>
          ${actionItems.length ? `<div class="action-list">${actionItems.map((a, i) => `
            <div class="action-item">
              <div class="action-num">${i + 1}</div>
              <div class="action-text">${a}</div>
            </div>`).join('')}</div>` :
          '<div style="font-size:11px;color:var(--warm-gray);line-height:1.7;">No action items at this time. Your advisor will update this section as your plan develops.</div>'}
        </div>
      </div>

      <!-- ADVISOR CONTACT -->
      <div class="advisor-card">
        <div class="advisor-initial">JE</div>
        <div class="advisor-info">
          <div class="advisor-name">Joshua Edwards</div>
          <div class="advisor-title">Licensed Financial Professional · Edwards Financial & Associates</div>
          <div class="advisor-contact">Life & Annuities · Retirement Planning · Estate Strategy</div>
        </div>
        <a class="btn-contact" href="index.html#contact">Schedule a Meeting</a>
      </div>

    </div>`;
  }

  async function signOut() {
    await sb.auth.signOut();
    window.location.href = 'portal-client-login.html';
  }

  init();
</script>
</body>
</html>
